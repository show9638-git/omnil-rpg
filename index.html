<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10151e" />
  <title>全零〈オムニル〉— 星なき始まり —</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <button id="homeButton" class="brand-button" aria-label="タイトルへ戻る">
        <span class="brand-mark">◈</span>
        <span>
          <strong>全零〈オムニル〉</strong>
          <small>星なき始まり　十地方・戦闘・自動化調整版 v0.9.1</small>
        </span>
      </button>
      <div class="topbar-actions">
        <button id="saveButton" class="icon-button" title="セーブ">▣</button>
        <button id="menuButton" class="icon-button" title="メニュー">☰</button>
      </div>
    </header>

    <main id="gameRoot" class="game-root"></main>

    <nav id="bottomNav" class="bottom-nav hidden" aria-label="ゲームメニュー">
      <button data-nav="world"><span>◫</span>世界</button>
      <button data-nav="party"><span>♙</span>仲間</button>
      <button data-nav="quests"><span>☷</span>依頼</button>
      <button data-nav="bag"><span>▤</span>荷袋</button>
    </nav>
  </div>

  <div id="modalLayer" class="modal-layer" aria-hidden="true"></div>
  <div id="toastLayer" class="toast-layer" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/data-v07.js"></script>
  <script src="js/data-v08.js"></script>
  <script src="js/data-v09.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
